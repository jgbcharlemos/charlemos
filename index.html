<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0F6E56" />
  <title>Charlemos</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main id="app">

    <!-- Pantalla 1: Bienvenida -->
    <section class="screen screen--active" id="screen-welcome">
      <div class="welcome">
        <div class="welcome__icon">🗣️</div>
        <h1 class="welcome__title">¡Hola, <span id="welcome-name">Dario</span>!</h1>
        <p class="welcome__subtitle">Me alegra verte. ¿Conversamos un ratico?</p>
        <div class="session-tags" id="session-tags">
          <span class="tag tag--am tag--pending" id="tag-am">☀️ Mañana</span>
          <span class="tag tag--pm tag--pending" id="tag-pm">🌙 Tarde</span>
        </div>
        <div id="resume-banner" style="display:none;" class="resume-banner">
          <div class="resume-banner__title">Tienes una charla guardada</div>
          <div class="resume-banner__subtitle" id="resume-topic-label"></div>
        </div>
        <button class="btn" id="btn-start">¿De qué quieres hablar hoy?</button>
        <button class="btn btn--outline" id="btn-resume" style="display:none;">Retomar la charla anterior</button>
        <button class="btn btn--ghost" id="btn-settings">⚙️ Ajustes</button>
      </div>
    </section>

    <!-- Pantalla 2: Seleccion de tema -->
    <section class="screen" id="screen-topics">
      <h2 class="screen__title">¿De qué hablamos?</h2>
      <div class="topics" id="topics-grid"></div>
      <button class="btn btn--ghost" id="btn-surprise">🎲 Sorpréndeme</button>
      <button class="btn btn--ghost" id="btn-back-welcome">← Volver</button>
    </section>

    <!-- Pantalla 3: Conversacion -->
    <section class="screen" id="screen-chat">
      <div class="chat__header">
        <span class="tag tag--am" id="chat-session-tag">☀️ Mañana</span>
        <span class="chat__topic-label" id="chat-topic-label"></span>
      </div>
      <div class="timer-wrap">
        <div class="timer-bar"><div class="timer-bar__fill" id="timer-fill"></div></div>
        <div class="timer-label"><span id="timer-elapsed">0 min</span><span>15 min</span></div>
      </div>
      <div class="chat__bubble" id="ai-text" aria-live="polite">…</div>
      <div class="chat__status" id="chat-status"></div>
      <button class="mic" id="btn-mic" aria-label="Hablar">
        <span class="mic__icon">🎤</span>
        <span class="mic__label" id="mic-label">Toca para hablar</span>
      </button>
      <button class="btn btn--ghost" id="btn-pause">⏸ Pausar conversación</button>
      <button class="btn btn--ghost" id="btn-change-topic">↺ Cambiar tema</button>
    </section>

    <!-- Pantalla 4: Completado (15 min cumplidos) -->
    <section class="screen" id="screen-completion">
      <div class="completion">
        <div class="completion__icon">✅</div>
        <h2 class="completion__title" id="completion-title">¡Listo, Don Dario!</h2>
        <p class="completion__subtitle" id="completion-subtitle">Estuvo muy bien la charla de hoy.</p>
        <div class="sessions-summary" id="sessions-summary"></div>
        <button class="btn" id="btn-keep-talking">Seguir charlando</button>
        <button class="btn btn--outline" id="btn-change-topic-completion">Cambiar de tema</button>
        <button class="btn btn--danger" id="btn-bye">Hasta luego</button>
      </div>
    </section>

    <!-- Pantalla 5: Ajustes -->
    <section class="screen" id="screen-settings">
      <h2 class="screen__title">Ajustes</h2>
      <label class="field">
        <span class="field__label">Nombre</span>
        <input class="field__input" id="input-name" type="text" autocomplete="off" />
      </label>
      <label class="field">
        <span class="field__label">Voz</span>
        <select class="field__input" id="select-voice"></select>
      </label>
      <label class="field">
        <span class="field__label">¿Cómo va hablando?</span>
        <select class="field__input" id="select-level"></select>
      </label>
      <label class="field">
        <span class="field__label">Volumen</span>
        <input class="field__input" id="input-volume" type="range" min="0" max="1" step="0.1" />
      </label>
      <button class="btn" id="btn-save-settings">Guardar</button>
      <button class="btn btn--ghost" id="btn-back-settings">← Volver</button>
    </section>

  </main>
  <script type="module" src="js/app.js"></script>
</body>
</html>
