<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Charlemos — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --green: #0F6E56; --green-l: #E1F5EE; --border: #B4D4C8; --text: #1A3329; --text2: #3B6D11; --bg: #F0F7F4; }
    body { font-family: system-ui, sans-serif; font-size: 16px; background: var(--bg); color: var(--text); padding: 2rem 1rem; }
    h1 { color: var(--green); font-size: 1.8rem; margin-bottom: 1.5rem; }
    h2 { color: var(--green); font-size: 1.2rem; margin-bottom: 0.5rem; }
    #login { max-width: 400px; margin: 6rem auto; background: white; border: 1px solid var(--border); border-radius: 16px; padding: 2rem; display: flex; flex-direction: column; gap: 1rem; }
    input[type=password] { padding: 14px; border: 2px solid var(--border); border-radius: 10px; font-size: 18px; width: 100%; }
    button { padding: 14px; background: var(--green); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: 700; cursor: pointer; }
    #error { color: #A32D2D; font-size: 14px; }
    #panel { display: none; max-width: 900px; margin: 0 auto; }
    .stats { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 2rem; }
    .stat { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.5rem; flex: 1; min-width: 140px; }
    .stat__num { font-size: 2rem; font-weight: 700; color: var(--green); }
    .stat__label { font-size: 13px; color: var(--text2); margin-top: 2px; }
    .session-card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; }
    .session-card__header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
    .session-card__date { font-weight: 700; color: var(--green); }
    .session-card__meta { font-size: 13px; color: var(--text2); }
    .badge { display: inline-block; font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
    .badge--am { background: #C0DD97; color: #27500A; }
    .badge--pm { background: #B5D4F4; color: #0C447C; }
    .analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .analysis-item { background: var(--bg); border-radius: 10px; padding: 0.75rem; }
    .analysis-item__label { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .analysis-item__value { font-size: 14px; color: var(--text); line-height: 1.5; }
    .rec { background: var(--green-l); border-radius: 10px; padding: 0.75rem; margin-top: 0.75rem; font-size: 14px; color: var(--text); }
    .rec strong { color: var(--green); }
    #empty { text-align: center; padding: 3rem; color: var(--text2); }
    .device-card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .device-card__info { font-size: 14px; color: var(--text2); }
    .device-card__status { font-weight: 700; color: var(--green); }
    .btn-revoke { padding: 10px 20px; background: transparent; border: 2px solid #A32D2D; color: #A32D2D; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; }
    @media(max-width: 500px) { .analysis-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div id="login">
  <h2>Panel de administración</h2>
  <p style="font-size:14px; color: var(--text2);">Ingresa la contraseña para ver los reportes de Dario.</p>
  <input type="password" id="pwd" placeholder="Contraseña" />
  <button id="btn-login">Entrar</button>
  <p id="error"></p>
</div>

<div id="panel">
  <h1>Reportes de Charlemos</h1>
  <div id="device-card" class="device-card" style="display:none;">
    <div>
      <div class="device-card__status" id="device-status"></div>
      <div class="device-card__info" id="device-info"></div>
    </div>
    <button class="btn-revoke" id="btn-revoke">Cerrar sesión del dispositivo</button>
  </div>
  <div class="stats" id="stats"></div>
  <div id="sessions-list"></div>
</div>

<script>
let adminPwd = '';

document.getElementById('btn-login').addEventListener('click', async () => {
  const pwd = document.getElementById('pwd').value;
  if (!pwd) return;
  document.getElementById('btn-login').textContent = 'Verificando…';
  try {
    const res = await fetch('/api/sessions', { headers: { 'x-admin-password': pwd } });
    if (res.status === 401) {
      document.getElementById('error').textContent = 'Contraseña incorrecta.';
      document.getElementById('btn-login').textContent = 'Entrar';
      return;
    }
    if (!res.ok) throw new Error('Error del servidor');
    const data = await res.json();
    adminPwd = pwd;
    document.getElementById('login').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    renderSessions(data.sessions || []);
    loadDeviceStatus();
  } catch {
    document.getElementById('error').textContent = 'Error de conexión.';
    document.getElementById('btn-login').textContent = 'Entrar';
  }
});

async function loadDeviceStatus() {
  try {
    const res = await fetch('/api/device-status', { headers: { 'x-admin-password': adminPwd } });
    if (!res.ok) return;
    const data = await res.json();
    const card = document.getElementById('device-card');
    const statusEl = document.getElementById('device-status');
    const infoEl = document.getElementById('device-info');
    card.style.display = 'flex';
    if (data.active) {
      const date = new Date(data.registeredAt).toLocaleString('es-CO');
      statusEl.textContent = '📱 Dispositivo activo';
      infoEl.textContent = `Registrado el ${date}`;
    } else {
      statusEl.textContent = '⚪ Sin dispositivo activo';
      infoEl.textContent = 'Ningún celular ha ingresado con el PIN.';
      document.getElementById('btn-revoke').style.display = 'none';
    }
  } catch { /* ignorar */ }
}

document.getElementById('btn-revoke').addEventListener('click', async () => {
  if (!confirm('¿Cerrar la sesión del dispositivo activo?')) return;
  const btn = document.getElementById('btn-revoke');
  btn.textContent = 'Cerrando…';
  btn.disabled = true;
  try {
    const res = await fetch('/api/revoke-device', {
      method: 'POST',
      headers: { 'x-admin-password': adminPwd },
    });
    if (res.ok) {
      document.getElementById('device-status').textContent = '⚪ Sin dispositivo activo';
      document.getElementById('device-info').textContent = 'La sesión fue cerrada. El próximo celular que ingrese el PIN quedará activo.';
      btn.style.display = 'none';
    }
  } catch { /* ignorar */ }
  btn.textContent = 'Cerrar sesión del dispositivo';
  btn.disabled = false;
});

document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('btn-login').click(); });

function renderSessions(sessions) {
  const list = document.getElementById('sessions-list');
  const stats = document.getElementById('stats');
  const totalMin = sessions.reduce((a, s) => a + (s.durationMin || 0), 0);
  const daysSet = new Set(sessions.map(s => s.date));
  const amCount = sessions.filter(s => s.slot === 'am').length;
  const pmCount = sessions.filter(s => s.slot === 'pm').length;
  stats.innerHTML = `
    <div class="stat"><div class="stat__num">${sessions.length}</div><div class="stat__label">Sesiones totales</div></div>
    <div class="stat"><div class="stat__num">${daysSet.size}</div><div class="stat__label">Días activos</div></div>
    <div class="stat"><div class="stat__num">${totalMin}</div><div class="stat__label">Minutos totales</div></div>
    <div class="stat"><div class="stat__num">${amCount}/${pmCount}</div><div class="stat__label">Mañana / Tarde</div></div>
  `;
  if (sessions.length === 0) { list.innerHTML = '<div id="empty">Aún no hay sesiones registradas.</div>'; return; }
  list.innerHTML = sessions.map(s => {
    const a = s.analysis || {};
    return `
    <div class="session-card">
      <div class="session-card__header">
        <div>
          <div class="session-card__date">${s.date} · ${s.time}</div>
          <div class="session-card__meta">${s.topicKey} · ${s.durationMin} min · nivel ${s.level}</div>
        </div>
        <span class="badge badge--${s.slot || 'am'}">${s.slot === 'pm' ? '🌙 Tarde' : '☀️ Mañana'}</span>
      </div>
      <div class="analysis-grid">
        ${a.fluency ? `<div class="analysis-item"><div class="analysis-item__label">Fluidez</div><div class="analysis-item__value">${a.fluency}</div></div>` : ''}
        ${a.response_length ? `<div class="analysis-item"><div class="analysis-item__label">Extensión</div><div class="analysis-item__value">${a.response_length}</div></div>` : ''}
        ${a.engagement ? `<div class="analysis-item"><div class="analysis-item__label">Participación</div><div class="analysis-item__value">${a.engagement}</div></div>` : ''}
        ${a.progress_note ? `<div class="analysis-item"><div class="analysis-item__label">Tendencia</div><div class="analysis-item__value">${a.progress_note}</div></div>` : ''}
      </div>
      ${a.recommendation ? `<div class="rec"><strong>Recomendación:</strong> ${a.recommendation}</div>` : ''}
    </div>`;
  }).join('');
}
</script>
</body>
</html>
